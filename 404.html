<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không tìm thấy trang | World Cup 2026</title>
    <link rel="stylesheet" href="/lich-thi-dau-world-cup-2026/style.css">
    <!-- PWA -->
    <meta name="theme-color" content="#FFD700">
    <link rel="icon" type="image/png" sizes="192x192" href="/lich-thi-dau-world-cup-2026/icon-192.png">
    
    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            background: var(--bg-dark);
            color: var(--text-light);
        }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .error-desc {
            color: var(--text-muted);
            margin-bottom: 2rem;
            max-width: 400px;
        }
        .btn-home {
            background: var(--gold);
            color: #000;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
            color: #000;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-icon">⚽ 🛑</div>
        <div class="error-code">404</div>
        <div class="error-message">Trọng tài đã thổi còi!</div>
        <p class="error-desc">Rất tiếc, trang bạn đang tìm kiếm không tồn tại hoặc đã bị phạt thẻ đỏ phải rời sân.</p>
        <a href="/lich-thi-dau-world-cup-2026/" class="btn-home">Quay lại Sân Vận Động (Trang chủ)</a>
    </div>
</body>
</html>
